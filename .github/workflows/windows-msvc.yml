name: Windows MSVC Build & Release

on:
  push:
    tags:
      - 'v*.*.*'         # Trigger saat push tag versi, contoh: v9.4.0
  workflow_dispatch:      # Bisa juga dijalankan manual dari Actions tab
    inputs:
      release_tag:
        description: 'Tag untuk release (contoh: v9.4.0-build1)'
        required: true
        default: 'v9.4.0-daily'

env:
  QTVER: 6.7.3
  CMAKE_GENERATOR: "Visual Studio 17 2022"
  # BtbN FFmpeg builds - lebih reliable dari gyan.dev
  FFMPEG_URL: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
  FFMPEG_DIR: "ffmpeg-master-latest-win64-gpl-shared"

jobs:
  build:
    name: Build Webcamoid (MSVC x64)
    runs-on: windows-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout source code (TANPA submodule)
      # ─────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: false    # Submodule mengarah ke repo private, tidak perlu

      # ─────────────────────────────────────────
      # 2. Install Python 3
      # ─────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ─────────────────────────────────────────
      # 3. Install Qt via aqtinstall
      # ─────────────────────────────────────────
      - name: Install Qt ${{ env.QTVER }} (MSVC 2019 x64)
        shell: pwsh
        run: |
          pip install -U pip
          pip install aqtinstall

          # Install Qt base + tambahan modul yang dibutuhkan Webcamoid
          # Webcamoid butuh: Concurrent, Quick, Multimedia, OpenGL, Widgets
          # Base sudah termasuk: Core, Gui, Widgets, Network, OpenGL, Concurrent, Qml, Quick
          # Perlu install terpisah: qtmultimedia, qtshadertools (dependency QtQuick)
          aqt install-qt windows desktop $env:QTVER win64_msvc2019_64 -O "C:\Qt" -m qtmultimedia qtshadertools

          Write-Host "Qt installed at C:\Qt\$env:QTVER\msvc2019_64"

          # Verifikasi modul Multimedia ada
          $mmDir = "C:\Qt\$env:QTVER\msvc2019_64\lib\cmake\Qt6Multimedia"
          if (Test-Path $mmDir) {
            Write-Host "Qt6Multimedia module: OK"
          } else {
            Write-Error "Qt6Multimedia module TIDAK ditemukan di $mmDir!"
            exit 1
          }

      # ─────────────────────────────────────────
      # 4. Download & Extract FFmpeg (BtbN builds)
      # ─────────────────────────────────────────
      - name: Download FFmpeg (BtbN latest)
        shell: pwsh
        run: |
          $url = "$env:FFMPEG_URL"
          $ffmpegZip = "ffmpeg-latest-win64.zip"
          Write-Host "Downloading FFmpeg from: $url"

          # Download dengan retry
          for ($i = 1; $i -le 3; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $ffmpegZip -UseBasicParsing
              Write-Host "Download berhasil!"
              break
            } catch {
              Write-Warning "Percobaan $i gagal: $_"
              Start-Sleep -Seconds 5
            }
          }

          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path $ffmpegZip -DestinationPath . -Force

          # Verifikasi direktori hasil ekstrak
          Write-Host "FFmpeg directory: $env:FFMPEG_DIR"
          if (Test-Path $env:FFMPEG_DIR) {
            Get-ChildItem $env:FFMPEG_DIR
          } else {
            Write-Host "Isi direktori saat ini:"
            Get-ChildItem . -Directory
            throw "Direktori FFmpeg tidak ditemukan: $env:FFMPEG_DIR"
          }

      # ─────────────────────────────────────────
      # 5. Install NSIS (untuk buat installer)
      # ─────────────────────────────────────────
      - name: Install NSIS
        shell: pwsh
        run: |
          # Gunakan Chocolatey - sudah pre-installed di semua GitHub Actions runners
          Write-Host "Installing NSIS via Chocolatey..."
          choco install nsis -y --no-progress

          # Verifikasi NSIS
          $nsisExe = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if ($nsisExe) {
            Write-Host "NSIS ditemukan di: $nsisExe"
            & $nsisExe /VERSION
          } else {
            Write-Error "NSIS tidak ditemukan setelah instalasi!"
            exit 1
          }

      # ─────────────────────────────────────────
      # 6. Setup Visual Studio 2022 environment
      # ─────────────────────────────────────────
      - name: Setup MSVC environment (VS 2022)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ─────────────────────────────────────────
      # 7. Configure CMake
      # ─────────────────────────────────────────
      - name: Configure CMake
        shell: cmd
        run: |
          set QTDIR=C:\Qt\%QTVER%\msvc2019_64
          set FFMPEG_PATH=%CD%\%FFMPEG_DIR%
          set INSTALL_PREFIX=%CD%\webcamoid-data

          set PATH=%QTDIR%\bin;%FFMPEG_PATH%\bin;%PATH%

          echo === CMake Configure ===
          echo QTDIR: %QTDIR%
          echo FFMPEG_PATH: %FFMPEG_PATH%
          echo INSTALL_PREFIX: %INSTALL_PREFIX%
          echo GIT_COMMIT: ${{ github.sha }}

          if not exist "%QTDIR%\bin\qmake.exe" (
            echo ERROR: Qt tidak ditemukan di %QTDIR%
            exit /b 1
          )

          if not exist "%FFMPEG_PATH%\include" (
            echo ERROR: FFmpeg tidak ditemukan di %FFMPEG_PATH%
            dir .
            exit /b 1
          )

          mkdir build
          cmake ^
            -LA ^
            -S . ^
            -B build ^
            -G "%CMAKE_GENERATOR%" ^
            -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_INSTALL_PREFIX="%INSTALL_PREFIX%" ^
            -DGIT_COMMIT_HASH="${{ github.sha }}" ^
            -DDAILY_BUILD=1 ^
            -DCMAKE_PREFIX_PATH="%QTDIR%;%FFMPEG_PATH%" ^
            -DNOLIBAVDEVICE=ON

      # ─────────────────────────────────────────
      # 8. Build Webcamoid
      # ─────────────────────────────────────────
      - name: Build
        shell: cmd
        run: |
          cmake --build build --config Release --parallel %NUMBER_OF_PROCESSORS%

      # ─────────────────────────────────────────
      # 9. Install (copy files ke webcamoid-data)
      # ─────────────────────────────────────────
      - name: Install
        shell: cmd
        run: |
          cmake --build build --config Release --target install

      # ─────────────────────────────────────────
      # 10. Deploy: Clone DeployTools & buat paket
      # ─────────────────────────────────────────
      - name: Clone DeployTools
        run: |
          git clone https://github.com/webcamoid/DeployTools.git

      - name: Create distribution packages
        shell: cmd
        run: |
          set QTDIR=C:\Qt\%QTVER%\msvc2019_64
          set FFMPEG_PATH=%CD%\%FFMPEG_DIR%
          set NSIS_DIR=C:\Program Files (x86)\NSIS

          set PATH=%QTDIR%\bin;%FFMPEG_PATH%\bin;%NSIS_DIR%;%PATH%
          set INSTALL_PREFIX=%CD%\webcamoid-data
          set PACKAGES_DIR=%CD%\webcamoid-packages\windows
          set BUILD_PATH=%CD%\build
          set PYTHONPATH=%CD%\DeployTools

          echo === Creating packages ===
          echo INSTALL_PREFIX: %INSTALL_PREFIX%
          echo PACKAGES_DIR: %PACKAGES_DIR%
          echo BUILD_PATH: %BUILD_PATH%

          mkdir "%PACKAGES_DIR%"

          python DeployTools\deploy.py ^
            -d "%INSTALL_PREFIX%" ^
            -c "%BUILD_PATH%\package_info.conf" ^
            -o "%PACKAGES_DIR%"

      # ─────────────────────────────────────────
      # 11. List hasil packages
      # ─────────────────────────────────────────
      - name: List built packages
        shell: pwsh
        run: |
          Write-Host "=== Packages yang dihasilkan ==="
          if (Test-Path "webcamoid-packages\windows") {
            Get-ChildItem "webcamoid-packages\windows" | Format-Table Name, Length, LastWriteTime
          } else {
            Write-Warning "Folder packages tidak ditemukan!"
          }

      # ─────────────────────────────────────────
      # 12. Upload sebagai workflow artifact (backup)
      # ─────────────────────────────────────────
      - name: Upload packages as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: webcamoid-windows-msvc-${{ github.sha }}
          path: webcamoid-packages/windows/*
          if-no-files-found: warn
          retention-days: 30

      # ─────────────────────────────────────────
      # 13. Tentukan release tag
      # ─────────────────────────────────────────
      - name: Determine release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "${{ github.event.inputs.release_tag }}"
            if (-not $tag) { $tag = "v9.4.0-daily" }
          }
          Write-Host "Release tag: $tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      # ─────────────────────────────────────────
      # 14. Create / Update GitHub Release & Upload
      # ─────────────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "Webcamoid ${{ steps.release_tag.outputs.tag }} (Windows MSVC)"
          body: |
            ## Webcamoid Windows Build (MSVC)

            **Build info:**
            - Commit: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - Qt Version: ${{ env.QTVER }}
            - FFmpeg: BtbN master-latest-win64-gpl-shared
            - Compiler: MSVC (Visual Studio 2022) x64
            - Run ID: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            **Files:**
            - `.zip` = Portable package (extract dan jalankan langsung)
            - `.exe` = NSIS Installer (install ke sistem)

            ---
            > Build ini dibuat secara otomatis oleh GitHub Actions.
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          files: |
            webcamoid-packages/windows/*
          token: ${{ secrets.GITHUB_TOKEN }}
