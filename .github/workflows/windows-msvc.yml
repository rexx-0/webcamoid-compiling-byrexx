name: Windows MSVC

on: [push, pull_request]

env:
  QTVER: 6.10.2
  FFMPEG_VERSION: 8.0.1
  CMAKE_GENERATOR: Visual Studio 17 2022

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install dependencies
      run: ./ports/ci/windows-msvc/install_deps.bat
    - name: Daily Build
      env:
        DAILY_BUILD: 1
      run: ./ports/ci/windows-msvc/build.bat
    - name: Copy Extra Plugins
      run: |
        mkdir -p build/Release/share/webcamoid/models/
        cp -R libAvKys/ExtraPlugins/* build/Release/share/webcamoid/models/ || echo "ExtraPlugins not found or already copied"
      shell: bash
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webcamoid-windows-build
        path: build/Release/
